<body>
<div class="container-fluid">
    <div class="row">
        <div class="col">
            <img src="./imgs/Greg.gif" alt="logo"/>
        </div>
        <div class="col"></div>
        <div class="col">
            <div class="btn-group mt-3 mb-0" role="group" aria-label="Navigation">
                <button id="home" type="button" class="btn btn-secondary">
                    Home
                </button>
                <button id="GH" type="button" class="btn btn-secondary">
                    GitHub
                </button>
                <button id="nextPage" type="button" class="btn btn-secondary">
                    Sample Page
                </button>
            </div>
        </div>
    </div>

<div class="form">
    <table>
        <tr>
            <td><label for ="first_name">First Name: </label></td>
            <td><input type = "text" name = "first_name" id="first_name"></td>
            <td><label for="email">Email: </label></td>
            <td><input type="email" id="email"></td>
            <td><input id="addComments" type="submit"></td>
            <td id ="textArea"></td>
        </tr>

        <tr>
            <script>
                let tr = document.createElement("P");
                // tr.innerHTML += "<b>hello!</b>";
                // tr.style.display = 'inline'; // don't give it a new block treat it as text within a line for no margin.
                var table = document.querySelector('table');
                table.innerHTML += "<caption id='loginCaption'>Login</caption>";
                table.style.border= "1px solid white";
                table.style.captionSide = 'top';
                table.style.display = 'table';
                var form = document.querySelector(".form");
                form.style.marginTop = '2pc';
                form.style.float = 'left';
                form.style.zIndex = '-1';
                table.append(tr);
            </script>
        </tr>
    </table>
</div>
    </div>
    <footer class="row">
        <div id="footContent" class="col">GREG <span id="clock"></span></div>
    </footer>
</div>
