<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
    <link id="fave" rel="icon" type="image/x-icon">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-logo">
            <p></p>
            <span id="nav_text"> </span>
        </div>
        <a href="https://gregoryshenefelt.com" class="navbar-link">Visit GregoryShenefelt.com</a>

    <div class="container">
        <h2>Pokemon Search</h2>
        <div class="mb-3">
            <label for="pokemonName" class="form-label">Enter Pokemon Name or ID:</label>
